<div class="space-y-6">
  <div class="flex justify-between items-center bg-white rounded-lg shadow p-6">
    <h1 class="text-3xl font-bold text-primary-green">📐 Gestão de Talhões</h1>
    <button class="bg-primary-green hover:bg-green-700 text-white font-semibold py-2 px-6 rounded-lg transition" (click)="openForm()">+ Novo Talhão</button>
  </div>

  <div class="bg-white rounded-lg shadow-lg p-6" *ngIf="showForm">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">{{ editMode ? 'Editar Talhão' : 'Novo Talhão' }}</h2>
    <form (ngSubmit)="saveTalhao()" class="space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Nome do Talhão</label>
          <input type="text" [(ngModel)]="selectedTalhao.nome" name="nome" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-green focus:border-transparent" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Fazenda</label>
          <select [(ngModel)]="selectedTalhao.fazendaId" name="fazendaId" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-green focus:border-transparent">
            <option value="0">Selecione uma fazenda</option>
            <option *ngFor="let fazenda of fazendas" [value]="fazenda.id">{{ fazenda.nome }}</option>
          </select>
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Área (hectares)</label>
          <input type="number" [(ngModel)]="selectedTalhao.area" name="area" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-green focus:border-transparent" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Cultura</label>
          <input type="text" [(ngModel)]="selectedTalhao.cultura" name="cultura" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-green focus:border-transparent" />
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Status</label>
        <select [(ngModel)]="selectedTalhao.status" name="status" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-green focus:border-transparent">
          <option value="DISPONIVEL">Disponível</option>
          <option value="EM_USO">Em Uso</option>
          <option value="MANUTENCAO">Manutenção</option>
        </select>
      </div>
      <div class="flex gap-3 pt-4">
        <button type="submit" class="bg-primary-green hover:bg-green-700 text-white font-semibold py-2 px-6 rounded-lg transition">Salvar</button>
        <button type="button" class="bg-gray-500 hover:bg-gray-600 text-white font-semibold py-2 px-6 rounded-lg transition" (click)="closeForm()">Cancelar</button>
      </div>
    </form>
  </div>

  <div class="bg-white rounded-lg shadow-lg overflow-hidden">
    <div class="overflow-x-auto" *ngIf="talhoes.length > 0; else noData">
      <table class="w-full">
        <thead class="bg-primary-green text-white">
          <tr>
            <th class="px-6 py-3 text-left text-sm font-semibold">Nome</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Fazenda</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Área (ha)</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Cultura</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Status</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Ações</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
          <tr *ngFor="let talhao of talhoes" class="hover:bg-gray-50 transition">
            <td class="px-6 py-4 text-sm text-gray-900">{{ talhao.nome }}</td>
            <td class="px-6 py-4 text-sm text-gray-900">{{ talhao.fazendaNome || 'N/A' }}</td>
            <td class="px-6 py-4 text-sm text-gray-900">{{ talhao.area }}</td>
            <td class="px-6 py-4 text-sm text-gray-900">{{ talhao.cultura }}</td>
            <td class="px-6 py-4 text-sm">
              <span class="px-3 py-1 rounded-full text-xs font-semibold" [ngClass]="{
                'bg-green-100 text-green-800': talhao.status === 'DISPONIVEL',
                'bg-blue-100 text-blue-800': talhao.status === 'EM_USO',
                'bg-yellow-100 text-yellow-800': talhao.status === 'MANUTENCAO'
              }">
                {{ talhao.status }}
              </span>
            </td>
            <td class="px-6 py-4 text-sm">
              <button class="text-2xl hover:scale-110 transition mr-2" (click)="openForm(talhao)" title="Editar">✏️</button>
              <button class="text-2xl hover:scale-110 transition" (click)="deleteTalhao(talhao.id!)" title="Excluir">🗑️</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <ng-template #noData>
      <div class="p-12 text-center">
        <p class="text-gray-500 text-lg">Nenhum talhão cadastrado ainda.</p>
      </div>
    </ng-template>
  </div>
</div>
