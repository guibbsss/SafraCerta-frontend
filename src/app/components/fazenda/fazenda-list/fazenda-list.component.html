<div class="space-y-6">
  <div class="flex justify-between items-center bg-white rounded-lg shadow p-6">
    <h1 class="text-3xl font-bold text-primary-green">🏞️ Gestão de Fazendas</h1>
    <button class="bg-primary-green hover:bg-green-700 text-white font-semibold py-2 px-6 rounded-lg transition" (click)="openForm()">
      + Nova Fazenda
    </button>
  </div>

  <div class="bg-white rounded-lg shadow-lg p-6" *ngIf="showForm">
    <h2 class="text-2xl font-bold text-gray-800 mb-6">{{ editMode ? 'Editar Fazenda' : 'Nova Fazenda' }}</h2>
    <form (ngSubmit)="saveFazenda()" class="space-y-4">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Nome da Fazenda</label>
          <input type="text" [(ngModel)]="selectedFazenda.nome" name="nome" required 
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-green focus:border-transparent" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Proprietário</label>
          <input type="text" [(ngModel)]="selectedFazenda.proprietario" name="proprietario" required 
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-green focus:border-transparent" />
        </div>
      </div>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Localização</label>
          <input type="text" [(ngModel)]="selectedFazenda.localizacao" name="localizacao" required 
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-green focus:border-transparent" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Área Total (hectares)</label>
          <input type="number" [(ngModel)]="selectedFazenda.areaTotal" name="areaTotal" required 
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-green focus:border-transparent" />
        </div>
      </div>
      <div class="flex gap-3 pt-4">
        <button type="submit" class="bg-primary-green hover:bg-green-700 text-white font-semibold py-2 px-6 rounded-lg transition">
          Salvar
        </button>
        <button type="button" class="bg-gray-500 hover:bg-gray-600 text-white font-semibold py-2 px-6 rounded-lg transition" (click)="closeForm()">
          Cancelar
        </button>
      </div>
    </form>
  </div>

  <div class="bg-white rounded-lg shadow-lg overflow-hidden">
    <div class="overflow-x-auto" *ngIf="fazendas.length > 0; else noData">
      <table class="w-full">
        <thead class="bg-primary-green text-white">
          <tr>
            <th class="px-6 py-3 text-left text-sm font-semibold">Nome</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Proprietário</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Localização</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Área Total (ha)</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Ações</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
          <tr *ngFor="let fazenda of fazendas" class="hover:bg-gray-50 transition">
            <td class="px-6 py-4 text-sm text-gray-900">{{ fazenda.nome }}</td>
            <td class="px-6 py-4 text-sm text-gray-900">{{ fazenda.proprietario }}</td>
            <td class="px-6 py-4 text-sm text-gray-900">{{ fazenda.localizacao }}</td>
            <td class="px-6 py-4 text-sm text-gray-900">{{ fazenda.areaTotal }}</td>
            <td class="px-6 py-4 text-sm">
              <button class="text-2xl hover:scale-110 transition mr-2" (click)="openForm(fazenda)" title="Editar">✏️</button>
              <button class="text-2xl hover:scale-110 transition" (click)="deleteFazenda(fazenda.id!)" title="Excluir">🗑️</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <ng-template #noData>
      <div class="p-12 text-center">
        <p class="text-gray-500 text-lg">Nenhuma fazenda cadastrada ainda.</p>
      </div>
    </ng-template>
  </div>
</div>
