<div class="max-w-5xl mx-auto">
  <div class="flex flex-wrap items-center justify-between gap-4 mb-6">
    <div class="flex items-center gap-4">
      <a routerLink="/administracao" class="text-primary-green hover:underline text-sm font-medium">← Voltar</a>
      <h1 class="text-2xl font-bold text-gray-800">Perfis</h1>
    </div>
    <button
      type="button"
      class="px-4 py-2 rounded-lg bg-primary-green text-white font-medium hover:opacity-90 transition-opacity"
      (click)="openNovo()"
    >
      Novo perfil
    </button>
  </div>
  <p class="text-gray-600 mb-6">Visualização das permissões ativas por perfil (somente leitura).</p>

  <div
    *ngIf="showForm"
    class="mb-6 p-4 rounded-xl border border-gray-200 bg-white shadow-sm flex flex-wrap items-end gap-4"
  >
    <div class="flex-1 min-w-[200px]">
      <label class="block text-sm font-medium text-gray-700 mb-1">Nome do perfil</label>
      <input
        type="text"
        [(ngModel)]="novoPerfilNome"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-green focus:border-transparent"
        placeholder="Ex.: Operador"
      />
    </div>
    <div class="flex gap-2">
      <button
        type="button"
        class="px-4 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50"
        (click)="cancelarNovo()"
        [disabled]="saving"
      >
        Cancelar
      </button>
      <button
        type="button"
        class="px-4 py-2 rounded-lg bg-primary-green text-white font-medium disabled:opacity-50"
        (click)="salvarNovo()"
        [disabled]="saving"
      >
        {{ saving ? 'A guardar…' : 'Guardar' }}
      </button>
    </div>
    <p *ngIf="saveError" class="w-full text-sm text-red-600">{{ saveError }}</p>
  </div>

  <p *ngIf="loading" class="text-gray-500">A carregar…</p>
  <p *ngIf="errorMessage" class="text-red-600 text-sm">{{ errorMessage }}</p>

  <div class="space-y-3" *ngIf="!loading && !errorMessage">
    <div
      *ngFor="let item of resumo"
      class="rounded-xl border border-gray-200 bg-white shadow-sm overflow-hidden"
    >
      <button
        type="button"
        class="w-full flex items-center justify-between px-4 py-3 text-left hover:bg-gray-50 transition-colors"
        (click)="togglePerfil(item.perfilId)"
      >
        <span class="font-semibold text-gray-800">{{ item.perfilNome }}</span>
        <span class="text-gray-400">{{ isExpanded(item.perfilId) ? '▼' : '▶' }}</span>
      </button>

      <div *ngIf="isExpanded(item.perfilId)" class="border-t border-gray-100 px-4 py-4 bg-gray-50">
        <p *ngIf="item.categorias.length === 0" class="text-sm text-gray-500">
          Este perfil ainda não tem permissões ativas.
        </p>

        <div *ngFor="let cat of item.categorias" class="mb-6 last:mb-0">
          <h3 class="text-sm font-bold text-gray-700 uppercase tracking-wide mb-3">{{ cat.nome }}</h3>
          <ul class="space-y-2">
            <li *ngFor="let perm of cat.permissoes" class="py-2 border-b border-gray-100 last:border-0">
              <p class="font-medium text-gray-800">{{ perm.nome }}</p>
              <p *ngIf="perm.descricao" class="text-sm text-gray-500">{{ perm.descricao }}</p>
            </li>
          </ul>
        </div>
      </div>
    </div>

    <p *ngIf="resumo.length === 0" class="text-gray-500 text-sm">Nenhum perfil encontrado.</p>
  </div>
</div>
