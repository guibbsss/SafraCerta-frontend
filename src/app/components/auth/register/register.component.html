<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-accent-blue via-primary-green to-green-700 p-4">
  <div class="w-full max-w-lg">
    <div class="bg-white rounded-lg shadow-2xl p-8">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-primary-green mb-2">Criar Conta</h1>
        <p class="text-gray-600">Cadastre-se no Safra Certa</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="space-y-5">
        <div>
          <label for="nome" class="block text-sm font-medium text-gray-700 mb-2">Nome</label>
          <input
            type="text"
            id="nome"
            name="nome"
            [(ngModel)]="user.nome"
            placeholder="Seu nome completo"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-green focus:border-transparent transition"
          />
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="user.email"
            placeholder="seu@email.com"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-green focus:border-transparent transition"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Senha</label>
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="user.password"
            placeholder="Crie uma senha"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-green focus:border-transparent transition"
          />
        </div>

        <div>
          <label for="confirmPassword" class="block text-sm font-medium text-gray-700 mb-2">Confirmar Senha</label>
          <input
            type="password"
            id="confirmPassword"
            name="confirmPassword"
            [(ngModel)]="confirmPassword"
            placeholder="Repita sua senha"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-green focus:border-transparent transition"
          />
        </div>

        <div *ngIf="errorMessage" class="bg-red-50 border-l-4 border-red-500 p-4 rounded">
          <p class="text-red-700">{{ errorMessage }}</p>
        </div>

        <div *ngIf="successMessage" class="bg-green-50 border-l-4 border-primary-green p-4 rounded">
          <p class="text-green-700">{{ successMessage }}</p>
        </div>

        <button
          type="submit"
          [disabled]="isLoading"
          class="w-full bg-primary-green hover:bg-green-700 text-white font-semibold py-3 px-4 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed"
        >
          {{ isLoading ? 'Cadastrando...' : 'Cadastrar-se' }}
        </button>
      </form>

      <div class="mt-6 text-center">
        <button
          type="button"
          (click)="goToLogin()"
          class="text-sm text-accent-blue hover:underline font-medium"
        >
          Ja tem conta? Entrar
        </button>
      </div>
    </div>
  </div>
</div>
