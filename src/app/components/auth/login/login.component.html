<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-primary-green via-green-600 to-accent-blue">
  <div class="w-full max-w-md">
    <div class="bg-white rounded-lg shadow-2xl p-8">
      <div class="text-center mb-8">
        <h1 class="text-4xl font-bold text-primary-green mb-2">🌾 Safra Certa</h1>
        <p class="text-gray-600">Gestão Inteligente de Fazendas</p>
      </div>

      <form (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-2">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            [(ngModel)]="credentials.email"
            placeholder="seu@email.com"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-green focus:border-transparent transition"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-2">Senha</label>
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="credentials.password"
            placeholder="Sua senha"
            required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-green focus:border-transparent transition"
          />
        </div>

        <div *ngIf="errorMessage" class="bg-red-50 border-l-4 border-red-500 p-4 rounded">
          <p class="text-red-700">{{ errorMessage }}</p>
        </div>

        <button 
          type="submit" 
          [disabled]="isLoading"
          class="w-full bg-primary-green hover:bg-green-700 text-white font-semibold py-3 px-4 rounded-lg transition disabled:opacity-50 disabled:cursor-not-allowed">
          {{ isLoading ? 'Entrando...' : 'Entrar' }}
        </button>

        <button
          type="button"
          (click)="goToRegister()"
          class="w-full bg-white border border-primary-green text-primary-green hover:bg-green-50 font-semibold py-3 px-4 rounded-lg transition"
        >
          Cadastrar-se
        </button>
      </form>

      <div class="mt-8 text-center">
        <p class="text-sm text-gray-500">Sistema de Gestão Agrícola</p>
      </div>
    </div>
  </div>
</div>
